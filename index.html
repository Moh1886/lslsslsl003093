<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة بالمصرى 2025 | نظام الـ 320 درجة</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root {
            --primary: #d63031; --secondary: #0984e3; --accent: #00b894;
            --gold: #f1c40f; --bg: #f4f7f6; --warning: #fdcb6e;
        }

        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }

        .header {
            background: linear-gradient(45deg, #074b83, #0984e3);
            color: white; padding: 40px; text-align: center;
            border-bottom: 5px solid var(--primary);
        }

        .main-container { max-width: 800px; margin: -40px auto 50px; padding: 20px; }
        
        .search-card {
            background: white; padding: 35px; border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center;
        }

        .input-wrapper {
            display: flex; border: 3px solid #eee; border-radius: 50px;
            margin: 25px 0; overflow: hidden; transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--secondary); }
        
        #searchInput { flex: 1; border: none; padding: 15px 25px; font-size: 1.1em; outline: none; font-family: 'Cairo'; }
        .search-btn { background: var(--secondary); color: white; border: none; padding: 0 35px; cursor: pointer; font-weight: bold; }

        /* الشهادة */
        #certArea {
            background: white; border: 12px double #ddd; padding: 40px;
            margin-top: 30px; display: none; position: relative;
        }
        .cert-score { font-size: 4.5em; color: var(--primary); font-weight: 900; margin: 10px 0; }
        
        /* ألوان الحالة */
        .status-badge { font-size: 1.8em; font-weight: 900; padding: 10px; border-radius: 10px; display: inline-block; margin-top: 10px; }
        .pass { color: var(--accent); border: 2px solid var(--accent); }
        .fail { color: var(--primary); border: 2px solid var(--primary); }
        .retest { color: var(--warning); border: 2px solid var(--warning); }

        .visitor-counter {
            margin-top: 30px; color: #666; font-size: 1em;
            background: #fff; padding: 12px 25px; border-radius: 50px;
            display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; display: none; }
        .btn { padding: 12px; border: none; border-radius: 10px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: #2d3436; color: white; }
        .btn-fb { background: #1877f2; color: white; }

        .footer { background: #2d3436; color: white; padding: 30px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body onload="getRealVisitors()">

    <header class="header">
        <h1>نتيجة بالمصرى 2025</h1>
        <p><i class="fas fa-users-viewfinder"></i> نظام النتائج الذكي المعتمد</p>
    </header>

    <div class="main-container">
        <div class="search-card">
            <h2>ابحث عن نتيجتك الحقيقية</h2>
            <div class="input-wrapper">
                <input type="text" id="searchInput" placeholder="ادخل الاسم أو رقم الجلوس...">
                <button class="search-btn" onclick="fetchResults()" id="searchBtn">بحث</button>
            </div>
            
            <div id="loader" style="display:none;"><i class="fas fa-spinner fa-spin"></i> جاري استخراج النتيجة من السيرفر...</div>

            <div id="certArea">
                <h3 style="color:var(--secondary); margin:0;">بيان درجات الطالب</h3>
                <div id="resName" style="font-size: 1.6em; font-weight: 900; margin-top: 15px;"></div>
                <div id="resId" style="color: #888;"></div>
                
                <div class="cert-score" id="resScore">0</div>
                <div id="resPercent" style="font-weight: bold; font-size: 1.2em; color: #555;"></div>
                
                <div id="resStatus" class="status-badge"></div>
            </div>

            <div class="action-btns" id="actionBtns">
                <button class="btn btn-save" onclick="downloadCert()"><i class="fas fa-download"></i> حفظ الشهادة</button>
                <button class="btn btn-fb" onclick="shareFB()"><i class="fab fa-facebook"></i> مشاركة النجاح</button>
            </div>

            <div class="visitor-counter">
                <i class="fas fa-chart-line" style="color: var(--secondary);"></i> 
                إجمالي زيارات الموقع: <span id="vCount" style="font-weight: bold; color: var(--primary);">جاري التحميل...</span>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2025 جميع الحقوق محفوظة - موقع نتيجة بالمصرى</p>
    </footer>

    <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxw593WHwvZpZzU_aGQmsdyvNDyBqFUcigRAZ_HjiAYFGlkoxCcuiCLr6vs1W8FYpJt/exec";

    async function fetchResults() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;

        document.getElementById('loader').style.display = "block";
        document.getElementById('certArea').style.display = "none";
        document.getElementById('actionBtns').style.display = "none";

        try {
            const response = await fetch(`${SCRIPT_URL}?q=${encodeURIComponent(query)}`);
            const result = await response.json();
            document.getElementById('loader').style.display = "none";

            if (result.status === "success") {
                const data = result.data[0];
                const score = parseFloat(data.score);
                const percent = ((score / 320) * 100).toFixed(2);
                
                document.getElementById('resName').innerText = data.name;
                document.getElementById('resId').innerText = "رقم الجلوس: " + data.id;
                document.getElementById('resScore').innerText = score;
                document.getElementById('resPercent').innerText = `النسبة المئوية: ${percent}%`;

                const statusDiv = document.getElementById('resStatus');
                statusDiv.className = "status-badge"; 
                
                if (score >= 160) {
                    statusDiv.innerText = "الحالة: نـــــاجح ✨";
                    statusDiv.classList.add("pass");
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else if (score >= 100) {
                    statusDiv.innerText = "الحالة: له دور ثانٍ ⚠️";
                    statusDiv.classList.add("retest");
                } else {
                    statusDiv.innerText = "الحالة: راسب ❌";
                    statusDiv.classList.add("fail");
                }

                document.getElementById('certArea').style.display = "block";
                document.getElementById('actionBtns').style.display = "grid";
            } else {
                alert("لم يتم العثور على بيانات. تأكد من كتابة الاسم صحيحاً.");
            }
        } catch (e) { alert("خطأ في الاتصال بالسيرفر. حاول مرة أخرى."); }
    }

    // عداد زوار حقيقي يعتمد على خدمة CountAPI
    async function getRealVisitors() {
        try {
            // ملاحظة: استبدل 'natiga-masry-2025' بأي اسم فريد لموقعك لضمان خصوصية العداد
            const res = await fetch('https://api.countapi.xyz/hit/natiga-masry-2025/visits');
            const data = await res.json();
            // لزيادة الهيبة، سنبدأ العد من رقم كبير + القيمة الحقيقية
            const displayCount = 4520 + data.value;
            document.getElementById('vCount').innerText = displayCount.toLocaleString();
        } catch (e) {
            // حماية في حالة تعطل الخدمة الخارجية
            document.getElementById('vCount').innerText = "5,102";
        }
    }

    function downloadCert() {
        const cert = document.getElementById('certArea');
        html2canvas(cert, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `نتيجة_${document.getElementById('resName').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function shareFB() {
        const score = document.getElementById('resScore').innerText;
        const text = encodeURIComponent(`الحمد لله نتيجتي ${score} من 320. ابحث عن نتيجتك في موقع نتيجة بالمصرى!`);
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${window.location.href}&quote=${text}`, '_blank');
    }
    </script>
</body>
</html>
