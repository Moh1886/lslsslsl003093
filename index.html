<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة بالمصرى | بوابة نتائج الشهادة الثانوية 2025</title>
    
    <meta name="description" content="استعلم فوراً عن نتيجة الثانوية العامة 2025 بالاسم ورقم الجلوس. موقع نتيجة بالمصرى يوفر أسرع رابط للنتائج الرسمية.">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root {
            --primary: #d63031; /* أحمر جذاب */
            --secondary: #0984e3; /* أزرق ملكي */
            --accent: #00b894; /* أخضر للنجاح */
            --bg: #f0f2f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: #2d3436;
        }

        /* الهيدر المطور */
        .header {
            background: linear-gradient(135deg, var(--secondary), #074b83);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo { font-size: 2.5em; font-weight: 900; color: white; text-decoration: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* منطقة البحث */
        .hero {
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }
        .search-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid #eee;
        }
        .search-card h2 { color: var(--secondary); font-size: 1.8em; margin-bottom: 10px; }
        .search-card p { color: #636e72; margin-bottom: 30px; }

        .input-group {
            display: flex;
            background: #f9f9f9;
            border: 2px solid #dfe6e9;
            border-radius: 50px;
            padding: 5px 10px;
            transition: 0.3s;
        }
        .input-group:focus-within { border-color: var(--secondary); box-shadow: 0 0 10px rgba(9, 132, 227, 0.2); }
        
        #searchInput {
            flex: 1;
            border: none;
            background: transparent;
            padding: 15px;
            font-size: 1.1em;
            font-family: 'Cairo';
            outline: none;
        }
        
        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0 35px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-btn:hover { background: #b32525; transform: scale(1.05); }

        /* عرض النتيجة الاحترافية */
        #displayArea { margin-top: 30px; }
        .result-box {
            background: linear-gradient(to bottom, #ffffff, #fdfdfd);
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #eee;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        .result-box::before {
            content: "ناجح";
            position: absolute;
            top: 10px; left: -25px;
            background: var(--accent);
            color: white;
            padding: 5px 30px;
            transform: rotate(-45deg);
            font-size: 0.8em;
            font-weight: bold;
        }
        .student-info { text-align: right; margin-bottom: 15px; }
        .student-name { color: var(--secondary); font-size: 1.4em; font-weight: bold; display: block; }
        .student-id { color: #b2bec3; font-size: 0.9em; }
        
        .score-circle {
            background: var(--bg);
            width: 100px; height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto;
            border: 5px solid var(--accent);
            font-size: 2em;
            font-weight: 900;
            color: var(--primary);
        }

        /* أزرار التواصل */
        .actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Cairo';
            font-size: 0.9em;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-download { background: #2d3436; color: white; }
        .btn-facebook { background: #1877f2; color: white; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* الفوتر */
        .footer { background: #2d3436; color: white; padding: 40px 20px; text-align: center; margin-top: 50px; }
        .footer a { color: #00cec9; text-decoration: none; margin: 0 10px; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header class="header">
        <a href="#" class="logo">نتيجة بالمصرى 2025</a>
        <p>الرابط المعتمد لنتائج الثانوية العامة في مصر</p>
    </header>

    <main class="hero">
        <div class="search-card">
            <h2>✨ استعلم عن نتيجتك الآن</h2>
            <p>ادخل اسمك أو رقم جلوسك لعرض الدرجات فوراً</p>
            
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="اكتب اسمك أو رقم جلوسك...">
                <button class="search-btn" id="searchBtn" onclick="fetchResults()">بحث</button>
            </div>

            <div id="displayArea">
                </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2025 بوابة نتيجة بالمصرى | جميع الحقوق محفوظة</p>
        <div style="margin-top: 10px;">
            <a href="#">من نحن</a> | <a href="#">سياسة الخصوصية</a> | <a href="#">اتصل بنا</a>
        </div>
    </footer>

    <script>
    async function fetchResults() {
        const query = document.getElementById('searchInput').value.trim();
        const displayArea = document.getElementById('displayArea');
        const btn = document.getElementById('searchBtn');
        const scriptUrl = "https://script.google.com/macros/s/AKfycbx-GU-bDTcYoOo6v4U1MCj24K9hThrsuw_YCW4hKkzG7Q8SZk4P6fpxwPeak9VouoIe/exec"; 

        if (!query) return;

        btn.disabled = true;
        btn.innerHTML = "جاري..";
        displayArea.innerHTML = "<div style='padding:20px'>🔍 جاري البحث في السجلات الرسمية...</div>";

        try {
            const response = await fetch(`${scriptUrl}?q=${encodeURIComponent(query)}`);
            const result = await response.json();

            btn.disabled = false;
            btn.innerHTML = "بحث";
            displayArea.innerHTML = ""; 

            if (result.status === "success") {
                result.data.forEach((item, index) => {
                    const resId = `res-${index}`;
                    displayArea.innerHTML += `
                        <div class="result-box" id="${resId}">
                            <div class="student-info">
                                <span class="student-name">${item.name}</span>
                                <span class="student-id">رقم الجلوس: ${item.id}</span>
                            </div>
                            <div class="score-circle">${item.score}</div>
                            <p style="margin-top:10px; font-weight:bold; color:var(--accent)">تهانينا بالنجاح الباهر!</p>
                        </div>
                        <div class="actions">
                            <button class="action-btn btn-download" onclick="downloadImage('${resId}', '${item.name}')">💾 حفظ الصورة</button>
                            <button class="action-btn btn-facebook" onclick="shareFB('${item.score}', '${item.name}')">🔵 مشاركة</button>
                        </div>
                    `;
                });
            } else {
                displayArea.innerHTML = "<div style='color:red; padding:20px;'>❌ لم نجد بيانات بهذا الاسم أو الرقم. راجع بياناتك وحاول مرة أخرى.</div>";
            }
        } catch (error) {
            displayArea.innerHTML = "<div style='color:red; padding:20px;'>⚠️ خطأ في الاتصال بالسيرفر. حاول مرة ثانية.</div>";
            btn.disabled = false;
            btn.innerHTML = "بحث";
        }
    }

    function downloadImage(id, name) {
        html2canvas(document.getElementById(id), { backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `نتيجة-${name}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function shareFB(score, name) {
        const text = encodeURIComponent(`الحمد لله! حصلت على ${score} في الثانوية العامة. ابحث عن نتيجتك الآن في موقع نتيجة بالمصرى!`);
        window.open(`https://www.facebook.com/sharer/sharer.php?quote=${text}&u=${window.location.href}`, '_blank');
    }

    document.getElementById("searchInput").addEventListener("keypress", (e) => { if (e.key === "Enter") fetchResults(); });
    </script>
</body>
</html>
